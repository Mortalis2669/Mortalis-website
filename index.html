<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mortalis</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #sim {
  position: absolute;
  right: 0;
  top: 0;
  width: 60%;
  height: 100%;
}

#projects {
  position: absolute;
  top: 50px;
  right: 50px;
  width: 300px;
  padding: 20px;
  background: rgba(30, 30, 30, 0.8); /* semi-transparent dark panel */
  border: 2px solid #ffffff33;       /* subtle border */
  border-radius: 12px;
  backdrop-filter: blur(5px);        /* gives it a cool glassy look */
  color: white;
  font-family: 'Arial', sans-serif;
  z-index: 2;                        /* above canvas */
}

#projects h2 {
  margin-top: 0;
  margin-bottom: 10px;
  font-size: 22px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #ffffffcc;
}

#projects ul {
  padding-left: 20px;
  margin: 0;
  list-style-type: disc;
}

#projects li {
  margin-bottom: 8px;
  font-size: 16px;
  line-height: 1.4;
  color: #ddd;
}

    .container {
      position: absolute;
      left: 60px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
    }

    h1 {
      font-size: 80px;
      margin: 0;
    }

    #age {
      margin-top: 10px;
      font-size: 24px;
      opacity: 0.8;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }
  </style>
</head>

<body>

<div id="projects">
  <h2>Ongoing Projects</h2>
  <ul>
    <li>Hodge Conjecture</li>
    <li></li>
    <li></li>
    <!-- Add more items here anytime -->
  </ul>
</div>

<canvas id="sim"></canvas>

<div class="container">
  <h1>Mortalis</h1>
  <div id="age"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
  // AGE COUNTER
  const birthDate = new Date("2009-06-26T00:00:00");

  function updateAge() {
    const now = new Date();
    const diff = now - birthDate;
    const years = diff / (1000 * 60 * 60 * 24 * 365.25);
    document.getElementById("age").textContent =
      years.toFixed(9) + " years old";
  }

  setInterval(updateAge, 100);
  updateAge();



  // MATTER JS
  const { Engine, Render, World, Bodies, Mouse, MouseConstraint } = Matter;

  const engine = Engine.create();

  const render = Render.create({
    element: document.body,
    engine: engine,
    options: {
      width: window.innerWidth,
      height: window.innerHeight,
      wireframes: false,
      background: "transparent"
    }
  });

  // Ground
  const ground = Bodies.rectangle(
    window.innerWidth / 2,
    window.innerHeight - 10,
    window.innerWidth,
    20,
    { isStatic: true }
  );

  // Multiple falling boxes (so you SEE something)
  const boxes = [];
  for (let i = 0; i < 5; i++) {
    boxes.push(
      Bodies.rectangle(200 + i * 100, 0, 60, 60, {
        restitution: 0.8 // bounce
      })
    );
  }

  // Mouse interaction
  const mouse = Mouse.create(render.canvas);
  const mouseConstraint = MouseConstraint.create(engine, {
    mouse: mouse
  });

  World.add(engine.world, [ground, ...boxes, mouseConstraint]);

  Engine.run(engine);
  Render.run(render);
</script>

<script>
  // SCENE
  const scene = new THREE.Scene();

  // CAMERA
  const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  // RENDERER
  const renderer = new THREE.WebGLRenderer({ alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.domElement.style.position = "absolute";
  renderer.domElement.style.top = "0";
  renderer.domElement.style.left = "0";
  renderer.domElement.style.zIndex = "0"; // behind text

  document.body.appendChild(renderer.domElement);

  // CUBE
  const geometry = new THREE.BoxGeometry();
  const material = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    wireframe: true
  });

  const cube = new THREE.Mesh(geometry, material);
  scene.add(cube);

  // POSITION (move to right side)
  cube.position.x = 2;

  camera.position.z = 5;

  // ANIMATION
  function animate() {
    requestAnimationFrame(animate);

    cube.rotation.x += 0.01;
    cube.rotation.y += 0.01;

    renderer.render(scene, camera);
  }

  animate();
</script>

<script>
const canvas = document.getElementById("sim");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth * 0.6;
canvas.height = window.innerHeight;

// Physics constants
const G = 0.1;

// Particle class
class Body {
  constructor(x, y, vx, vy, mass) {
    this.x = x;
    this.y = y;
    this.vx = vx;
    this.vy = vy;
    this.mass = mass;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, Math.sqrt(this.mass), 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();
  }
}

// Create bodies
let bodies = [];

for (let i = 0; i < 50; i++) {
  bodies.push(new Body(
    Math.random() * canvas.width,
    Math.random() * canvas.height,
    (Math.random() - 0.5) * 1,
    (Math.random() - 0.5) * 1,
    Math.random() * 20 + 10
  ));
}

// Main loop
function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Apply gravity
  for (let i = 0; i < bodies.length; i++) {
    for (let j = 0; j < bodies.length; j++) {
      if (i === j) continue;

      let dx = bodies[j].x - bodies[i].x;
      let dy = bodies[j].y - bodies[i].y;

      let dist = Math.sqrt(dx * dx + dy * dy) + 0.1;

      let force = (G * bodies[i].mass * bodies[j].mass) / (dist * dist);

      let ax = (force * dx / dist) / bodies[i].mass;
      let ay = (force * dy / dist) / bodies[i].mass;

      bodies[i].vx += ax;
      bodies[i].vy += ay;
    }
  }

  // Update positions
  for (let body of bodies) {
    body.x += body.vx;
    body.y += body.vy;

    body.draw();
  }

  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
